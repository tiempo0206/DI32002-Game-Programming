            test -f "$asset" || {
              echo "Missing required hangar asset: $asset"
              exit 1
            }
          done

          if grep -R -n 'm_Shader: {fileID: 46, guid: 0000000000000000f000000000000000, type: 0}\\|m_Shader: {fileID: 10755, guid: 0000000000000000f000000000000000, type: 0}' 'Splat Fighters/Assets/Hangar Building Modular/Materials'; then
            echo "Hangar materials must use URP-compatible shaders, not legacy built-in shaders."
            exit 1
          fi

          grep -R -q 'guid: 933532a4fcc9baf4fa0491de14d08ed7' 'Splat Fighters/Assets/Hangar Building Modular/Materials' || {
            echo "Expected hangar materials to use the URP Lit shader."
            exit 1
          }

          grep -R -q '_BaseMap' 'Splat Fighters/Assets/Hangar Building Modular/Materials' || {
            echo "Expected hangar materials to serialize URP BaseMap texture bindings."
            exit 1
