            'Splat Fighters/Docs/ADR-001-Input-System-Strategy.md'
            'Splat Fighters/Docs/Public_Asset_Usage.md'
            'Splat Fighters/Docs/Performance_Notes.md'
            'Splat Fighters/Docs/Final_Map_Playtest_And_Route_Tuning.md'
            'class activity/2D-shooter/Packages/manifest.json'
            'class activity/2D-shooter/Packages/packages-lock.json'
            'class activity/2D-shooter/ProjectSettings/ProjectVersion.txt'
            'class activity/2D-shooter/ProjectSettings/EditorBuildSettings.asset'
            'class activity/2D-shooter/Assets/_Scenes/Level1_scene.unity'
            'class activity/2D-shooter/Assets/Scripts/Enemies/EnemySpawner.cs'
            'class activity/2D-shooter/Assets/Scripts/ShootingProjectiles/ShootingController.cs'
