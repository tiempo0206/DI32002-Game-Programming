            'Splat Fighters/Assets/Scenes/SampleScene.unity'
            'Splat Fighters/Assets/Settings/SampleSceneProfile.asset'
            'Splat Fighters/Assets/TutorialInfo'
          )

          for path in "${removed_template_paths[@]}"; do
            if [ -e "$path" ]; then
              echo "Found removed Unity template leftover: $path"
              exit 1
            fi
          done

          grep -q 'path: Assets/Scenes/MVP_ShootingTest.unity' "$build_settings" || {
            echo "Expected Splat Fighters build settings to point at MVP_ShootingTest."
            exit 1
          }

          grep -q 'guid: a1f4345ac2e014b679fae8c9823bc7ee' "$build_settings" || {
            echo "Expected Splat Fighters build settings to use the MVP_ShootingTest scene GUID."
            exit 1
          }

          if grep -R 'Assets/Scenes/SampleScene.unity' "$build_settings" "$project_settings" 'Splat Fighters/Assets'; then
