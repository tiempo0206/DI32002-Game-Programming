name: Course Project Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure generated Unity folders are not tracked
        shell: bash
        run: |
          set -euo pipefail

          forbidden_patterns=(
            '^Splat Fighters/Library/'
            '^Splat Fighters/Temp/'
            '^Splat Fighters/Logs/'
            '^Splat Fighters/UserSettings/'
            '^Splat Fighters/\.vscode/'
            '^Splat Fighters/.*\.csproj$'
            '^Splat Fighters/.*\.sln$'
            '^class activity/2D-shooter/Library/'
            '^class activity/2D-shooter/Temp/'
            '^class activity/2D-shooter/Logs/'
            '^class activity/2D-shooter/UserSettings/'
            '^class activity/2D-shooter/\.vscode/'
            '^class activity/2D-shooter/.*\.csproj$'
            '^class activity/2D-shooter/.*\.sln$'
          )

          tracked_files="$(git ls-files)"

          for pattern in "${forbidden_patterns[@]}"; do
            if printf '%s\n' "$tracked_files" | grep -E "$pattern"; then
              echo "Forbidden generated/local file is tracked: $pattern"
              exit 1
            fi
          done

      - name: Ensure required project files exist
        shell: bash
        run: |
          set -euo pipefail

          required_files=(
            'Splat Fighters/Packages/manifest.json'
            'Splat Fighters/ProjectSettings/ProjectVersion.txt'
            'Splat Fighters/Assets/Scripts/Painting/Team.cs'
            'Splat Fighters/Assets/Scripts/Painting/PaintGridCell.cs'
            'Splat Fighters/Assets/Scripts/Painting/PaintableArea.cs'
            'Splat Fighters/Assets/Scripts/Painting/PaintManager.cs'
            'Splat Fighters/Assets/Scripts/Combat/CharacterHealth.cs'
            'Splat Fighters/Assets/Scripts/Weapons/InkProjectile.cs'
            'Splat Fighters/Assets/Scripts/Weapons/InkWeapon.cs'
            'Splat Fighters/Assets/Scripts/AI/BotController.cs'
            'Splat Fighters/Assets/Scripts/Visuals/TeamVisualPalette.cs'
            'Splat Fighters/Assets/Scripts/Visuals/TeamVisualBinder.cs'
            'Splat Fighters/Assets/Scripts/Player/PlayerInputHandler.cs'
            'Splat Fighters/Assets/Scripts/Player/PlayerController.cs'
            'Splat Fighters/Assets/Scripts/Player/ThirdPersonCameraFollow.cs'
            'Splat Fighters/Assets/Scripts/Player/AimController.cs'
            'Splat Fighters/Assets/Scripts/Level/SpawnPoint.cs'
            'Splat Fighters/Assets/Scripts/Level/PaintBlocker.cs'
            'Splat Fighters/Assets/Scripts/Managers/GameManager.cs'
            'Splat Fighters/Assets/Scripts/Managers/MatchTimer.cs'
            'Splat Fighters/Assets/Scripts/UI/AimReticleUI.cs'
            'Splat Fighters/Assets/Scripts/UI/ScoreUI.cs'
            'Splat Fighters/Assets/Editor/SplatFightersMvpSceneSetup.cs'
            'Splat Fighters/Assets/Editor/SplatFightersGrayboxMapBuilder.cs'
            'Splat Fighters/Assets/Scenes/MVP_ShootingTest.unity'
            'Splat Fighters/Assets/Prefabs/Weapons/InkProjectile.prefab'
            'Splat Fighters/Assets/Materials/Level/MAT_Level_Boundary.mat'
            'Splat Fighters/Assets/Materials/Level/MAT_Level_Cover.mat'
            'Splat Fighters/Assets/Materials/Level/MAT_Level_Platform.mat'
            'Splat Fighters/Assets/Materials/Level/MAT_Level_Ramp.mat'
            'Splat Fighters/Assets/Materials/Level/MAT_Level_Spawn_TeamA.mat'
            'Splat Fighters/Assets/Materials/Level/MAT_Level_Spawn_TeamB.mat'
            'Splat Fighters/Assets/Materials/Teams/MAT_TeamA_Player.mat'
            'Splat Fighters/Assets/Materials/Teams/MAT_TeamA_Projectile.mat'
            'Splat Fighters/Assets/Materials/Teams/MAT_TeamB_Bot.mat'
            'Splat Fighters/Assets/Materials/Teams/MAT_TeamB_Projectile.mat'
            'Splat Fighters/Docs/Splat_Fighters_Project_Technical_Documentation.docx'
            'class activity/2D-shooter/Packages/manifest.json'
            'class activity/2D-shooter/Packages/packages-lock.json'
            'class activity/2D-shooter/ProjectSettings/ProjectVersion.txt'
            'class activity/2D-shooter/ProjectSettings/EditorBuildSettings.asset'
            'class activity/2D-shooter/Assets/_Scenes/Level1_scene.unity'
            'class activity/2D-shooter/Assets/Scripts/Enemies/EnemySpawner.cs'
            'class activity/2D-shooter/Assets/Scripts/ShootingProjectiles/ShootingController.cs'
            'class activity/2D-shooter/Assets/Scripts/UI/StartMenuController.cs'
            'class activity/2D-shooter/Assets/Scripts/UI/ObjectiveDisplay.cs'
            'class activity/2D-shooter/Assets/Scripts/UI/PlayerHealthDisplay.cs'
            'class activity/2D-shooter/Assets/Scripts/UI/SceneFlowActions.cs'
            'class activity/2D-shooter/Assets/Prefabs/Effects/EnemyHitEffect.prefab'
            'class activity/2D-shooter/Assets/Prefabs/Effects/PlayerProjectileHitV2.prefab'
            'class activity/2D-shooter/Assets/Prefabs/Enemies/EnemyParts/EnemyGun.prefab'
            'class activity/2D-shooter/Assets/Prefabs/Enemies/IndividualEnemies/StationaryShooters/StraightShooter.prefab'
            'class activity/2D-shooter/Docs/5.9_Change_Log_and_Credits.md'
          )

          for file in "${required_files[@]}"; do
            test -f "$file" || {
              echo "Missing required file: $file"
              exit 1
            }
          done

      - name: Validate 4.27 2D shooter activity references
        shell: bash
        run: |
          set -euo pipefail

          if grep -R \
            -e 'Assets/Scenes/SampleScene.unity' \
            -e '2cda990e2423bbf4892e6590ba056729' \
            -e '728d251feda159b458e87d0141fc1d5d' \
            -e '9eb5a8624f0bc464aaefb5b0adc332ad' \
            -e '209d4d49de0bd3843b645f4a2775c108' \
            -e '9769a150f75db004799247e154454dd7' \
            'class activity/2D-shooter/Assets' \
            'class activity/2D-shooter/ProjectSettings'; then
            echo "Found stale scene path or broken imported-package GUID."
            exit 1
          fi

          grep -q 'com.unity.inputsystem' 'class activity/2D-shooter/Packages/manifest.json'
          grep -q 'path: Assets/_Scenes/Level1_scene.unity' 'class activity/2D-shooter/ProjectSettings/EditorBuildSettings.asset'

      - name: Validate 4.28 2D shooter playable MVP scene
        shell: bash
        run: |
          set -euo pipefail

          scene='class activity/2D-shooter/Assets/_Scenes/Level1_scene.unity'
          tags='class activity/2D-shooter/ProjectSettings/TagManager.asset'

          required_scene_patterns=(
            'm_Name: Player'
            'm_TagString: Player'
            'm_Name: ProjectileHolder'
            'm_Name: Main Camera'
            'm_Name: HUD Canvas'
            'm_Name: ScoreText'
            'm_Name: VictoryPage'
            'm_Name: GameOverPage'
            'value: GameManager'
            'value: UIManager'
            'value: EnemySpawnerStraight'
            'guid: dcba33f7f009a424e8f7a603aaec8262'
            'guid: f75388997f8d4264a86b7441dc9ea74e'
            'guid: 52c9a4613bbc6ce4b809b21678067793'
            'guid: 8d271c85fb6a1e546b37f1f81e5a648d'
            'guid: b5ce9867d2d7f4d44b5a3445bbb0e201'
            'guid: 14346f8fcc871204299029fedba2a3eb'
            'guid: aee1688b385340b4bab2b46707955895'
            'propertyPath: enemiesToDefeat'
            'propertyPath: maxSpawn'
            'propertyPath: spawnInfinite'
          )

          for pattern in "${required_scene_patterns[@]}"; do
            grep -q "$pattern" "$scene" || {
              echo "Missing playable MVP scene pattern: $pattern"
              exit 1
            }
          done

          grep -q '  - Player' "$tags" || {
            echo "Missing Player tag required for GameManager game-over flow."
            exit 1
          }

      - name: Validate 2D shooter background audio and boundaries
        shell: bash
        run: |
          set -euo pipefail

          scene='class activity/2D-shooter/Assets/_Scenes/Level1_scene.unity'
          player_fire='class activity/2D-shooter/Assets/Prefabs/Effects/Player/PlayerFireEffect.prefab'

          required_scene_patterns=(
            'm_Name: SpaceBackground'
            'guid: bef27f2a0099c6c46909640d0115b1e5'
            'm_Name: BackgroundMusic'
            'guid: 6863f84fb72922c479ebecc849abe751'
            'Loop: 1'
            'm_Name: AsteroidBoundary'
            'fireEffect: {fileID: 865587348948062071, guid: 11b4283cfd9904b01bee4ea7a822a044, type: 3}'
          )

          for pattern in "${required_scene_patterns[@]}"; do
            grep -q "$pattern" "$scene" || {
              echo "Missing background/audio/boundary scene pattern: $pattern"
              exit 1
            }
          done

          asteroid_count="$(grep -c 'm_Name: Boundary Asteroid' "$scene")"
          if [ "$asteroid_count" -lt 24 ]; then
            echo "Expected at least 24 boundary asteroids, found $asteroid_count"
            exit 1
          fi

          test -f "$player_fire"
          grep -q 'm_Name: PlayerFireEffect' "$player_fire"
          grep -q 'guid: 2f7ee51cc1e5f3e4fb1b273aa57cf7b4' "$player_fire"
          grep -q 'guid: b58ca2f55b8d54e44921b14b727bf610' "$player_fire"
          grep -q 'myRigidbody.MovePosition(nextPosition);' 'class activity/2D-shooter/Assets/Scripts/Player/Controller.cs'

      - name: Validate 5.9 2D shooter improvement activity
        shell: bash
        run: |
          set -euo pipefail

          scene='class activity/2D-shooter/Assets/_Scenes/Level1_scene.unity'
          start_menu_controller='class activity/2D-shooter/Assets/Scripts/UI/StartMenuController.cs'
          objective_display='class activity/2D-shooter/Assets/Scripts/UI/ObjectiveDisplay.cs'
          health_display='class activity/2D-shooter/Assets/Scripts/UI/PlayerHealthDisplay.cs'
          scene_flow='class activity/2D-shooter/Assets/Scripts/UI/SceneFlowActions.cs'
          straight_shooter='class activity/2D-shooter/Assets/Prefabs/Enemies/IndividualEnemies/StationaryShooters/StraightShooter.prefab'
          changelog='class activity/2D-shooter/Docs/5.9_Change_Log_and_Credits.md'

          required_menu_patterns=(
            'm_Name: StartMenu'
            'm_Name: MainMenuPage'
            'm_Name: InstructionsPage'
            'm_Name: NewGameButton'
            'm_Name: InstructionsButton'
            'm_Name: ExitButton'
            'm_Name: BackButton'
            'm_Name: ObjectiveText'
            'm_Name: HealthText'
            'm_Name: HighScoreText'
            'm_Name: TargetText'
            'm_Name: MenuMusic'
            'm_Name: SceneFlowActions'
            'm_Name: RetryButton'
            'm_Name: MenuButton'
            'm_Text: 5.9 CLASS ACTIVITY'
            "m_text: 'OBJECTIVE: Destroy 12 raiders and survive the asteroid belt.'"
            "m_text: 'TARGET: 0/12'"
            "m_text: 'HP: 5/5'"
            'guid: 557567248abe740679461196db7ab927'
            'guid: 7cddbdfcb971144d6b4a815576649f03'
            'guid: 655bef34f545147048e46b47affefc34'
            'guid: 207985c3cf6d64a86bf5114cab404c11'
            'guid: 2c7cc4c3cc08ca44ebdd6f1571de0373'
            'guid: 0e8c16ddf47db704ea56bdef23e5044d'
            'gameplayBehaviours:'
            'menuClickSound: {fileID: 8300000, guid: 2ee8db168070cea4bb1ea13a024acce9, type: 3}'
            'hitSound: {fileID: 8300000, guid: 792618d7eb3d43b45803d6775714eb2d, type: 3}'
            'deathSound: {fileID: 8300000, guid: 07dfbd4ab560947438f2c3cec15e5cce, type: 3}'
            'fireSound: {fileID: 8300000, guid: 2f7ee51cc1e5f3e4fb1b273aa57cf7b4, type: 3}'
          )

          for pattern in "${required_menu_patterns[@]}"; do
            grep -q "$pattern" "$scene" || {
              echo "Missing 5.9 improvement scene pattern: $pattern"
              exit 1
            }
          done

          test -f "$start_menu_controller"
          test -f "$objective_display"
          test -f "$health_display"
          test -f "$scene_flow"
          test -f "$straight_shooter"
          test -f "$changelog"
          grep -q 'public class StartMenuController' "$start_menu_controller"
          grep -q 'public static bool startImmediatelyOnNextLoad = false;' "$start_menu_controller"
          grep -q 'private void SetMusicForGameplay(bool gameplayActive)' "$start_menu_controller"
          grep -q 'public class ObjectiveDisplay' "$objective_display"
          grep -q 'public class PlayerHealthDisplay' "$health_display"
          grep -q 'public class SceneFlowActions' "$scene_flow"
          grep -q 'RetryLevel' "$scene_flow"
          grep -q 'ReturnToMenu' "$scene_flow"
          grep -q 'fireSound: {fileID: 8300000, guid: 90c9af27c6a1be948a5cccf9730a5c61, type: 3}' "$straight_shooter"
          grep -q 'hitSound: {fileID: 8300000, guid: f3b024d14c913d74ba5a66d5e9cb5e55, type: 3}' "$straight_shooter"
          grep -q 'deathSound: {fileID: 8300000, guid: 013337b7074c32640b54b6f880c9f419, type: 3}' "$straight_shooter"
          grep -q '## 5.9 Class Activity' "$changelog"
          grep -q '## Credits' "$changelog"

      - name: Validate Splat Fighters graybox map scene
        shell: bash
        run: |
          set -euo pipefail

          scene='Splat Fighters/Assets/Scenes/MVP_ShootingTest.unity'

          required_scene_patterns=(
            'm_Name: PaintableGround'
            'm_Name: GroundVisual'
            'm_Name: Player'
            'm_Name: FirePoint'
            'm_Name: PaintManager'
            'm_Name: GameManager'
            'm_Name: Main Camera'
            'm_Name: LevelRoot'
            'm_Name: BoundaryWalls'
            'm_Name: Obstacles'
            'm_Name: Cover'
            'm_Name: Platforms'
            'm_Name: SpawnPoints'
            'm_Name: AI'
            'm_Name: NorthBoundaryRail'
            'm_Name: SouthBoundaryRail'
            'm_Name: CenterContestBlock'
            'm_Name: CenterLeftPillar'
            'm_Name: CenterRightPillar'
            'm_Name: TeamASpawnLeftCover'
            'm_Name: TeamBSpawnRightCover'
            'm_Name: WestPlatformCover'
            'm_Name: EastPlatformCover'
            'm_Name: WestPlatformRamp'
            'm_Name: EastPlatformRamp'
            'm_Name: TeamASpawn'
            'm_Name: TeamBSpawn'
            'm_Name: TeamBBot'
            'm_Name: TeamBBotFirePoint'
            'm_Name: TeamBBotPatrolPoints'
            'm_Name: TeamBBotPaintTargets'
            'guid: 3b1f6fa4a44a34fd2b8d3115d8b234c5'
            'guid: 523848afdbb78428f9909a6a36dedc79'
            'guid: 6eae5c84c8a24551a6a1738913276ea9'
            'guid: e65d3f35aa204309aead02ea2b17a67a'
            'guid: 13b1c0840c8ae4d04a8bf41efc3983d2'
            'guid: 13eced9b9c66941f497c78ae0279d6df'
            'guid: ee07f6abdd1964429868fa0d1187932c'
            'requirePaintPointNearAreaPlane: 1'
            'rebuildMaskFromPaintBlockersOnAwake: 1'
            'resetCharactersOnMatchStart: 1'
            'destroyProjectilesOnMatchStart: 1'
            'playerRoot: {fileID:'
            'playerController: {fileID:'
            'teamBBot: {fileID:'
            'playerHealth: {fileID:'
            'teamBBotHealth: {fileID:'
            'respawnDelaySeconds: 2'
            'teamASpawn: {fileID:'
            'teamBSpawn: {fileID:'
            'playerWeapon: {fileID:'
            'useInkResource: 1'
            'maxInk: 100'
            'inkPerShot: 10'
            'ownPaintRecoveryMultiplier: 3.5'
            'groundProbe: {fileID:'
            'm_Name: SwimFormVisual'
            'swimMoveSpeedMultiplier: 1.55'
            'enemyPaintMoveSpeedMultiplier: 0.55'
            'swimInkRecoveryMultiplier: 1.8'
            'disableFireWhileSwimming: 1'
            'swimKey: 304'
            'enableKeyboardControls: 1'
            'startKey: 13'
            'restartKey: 114'
            'pauseKey: 112'
            'alternatePauseKey: 27'
            'pauseUsesTimeScale: 1'
            'team: 1'
            'team: 2'
            'enemyPaintDamagePerSecond: 35'
            'damageOnlyDuringMatch: 1'
          )

          for pattern in "${required_scene_patterns[@]}"; do
            grep -q "$pattern" "$scene" || {
              echo "Missing Splat Fighters graybox scene pattern: $pattern"
              exit 1
            }
          done

          paint_blocker_count="$(grep -c 'guid: 6eae5c84c8a24551a6a1738913276ea9' "$scene")"

          if [ "$paint_blocker_count" -lt 20 ]; then
            echo "Expected at least 20 PaintBlocker components in the graybox map, found $paint_blocker_count."
            exit 1
          fi

          team_visual_binder_count="$(grep -c 'guid: 13b1c0840c8ae4d04a8bf41efc3983d2' "$scene")"
          if [ "$team_visual_binder_count" -lt 2 ]; then
            echo "Expected TeamVisualBinder on both player and TeamB bot, found $team_visual_binder_count."
            exit 1
          fi

          grep -q 'guid: 2523003a8ccb1411c976d590e5f00eec' 'Splat Fighters/Assets/Prefabs/Weapons/InkProjectile.prefab' || {
            echo "Expected InkProjectile prefab to use the TeamA projectile material."
            exit 1
          }

          required_code_patterns=(
            'Paused'
            'RestartMatch'
            'PauseMatch'
            'ResumeMatch'
            'ResetCharactersToSpawns'
            'DestroyActiveProjectiles'
            'ResetWeaponResources'
          )

          for pattern in "${required_code_patterns[@]}"; do
            grep -q "$pattern" 'Splat Fighters/Assets/Scripts/Managers/GameManager.cs' || {
              echo "Missing match flow GameManager code pattern: $pattern"
              exit 1
            }
          done

          grep -q 'ControlsText' 'Splat Fighters/Assets/Scripts/UI/ScoreUI.cs' || {
            echo "Expected ScoreUI controls text support."
            exit 1
          }

          grep -q 'PresentationText' 'Splat Fighters/Assets/Scripts/UI/ScoreUI.cs' || {
            echo "Expected ScoreUI presentation banner text support."
            exit 1
          }

          grep -q 'InkText' 'Splat Fighters/Assets/Scripts/UI/ScoreUI.cs' || {
            echo "Expected ScoreUI ink resource text support."
            exit 1
          }

          grep -q 'HealthText' 'Splat Fighters/Assets/Scripts/UI/ScoreUI.cs' || {
            echo "Expected ScoreUI health text support."
            exit 1
          }

          required_presentation_patterns=(
            'PresentationBanner'
            'FormatPresentation'
            'GetPresentationColor'
            'Final'
            'Turf War'
          )

          for pattern in "${required_presentation_patterns[@]}"; do
            grep -q "$pattern" 'Splat Fighters/Assets/Scripts/UI/ScoreUI.cs' || {
              echo "Missing ScoreUI presentation code pattern: $pattern"
              exit 1
            }
          done

          required_weapon_patterns=(
            'useInkResource'
            'inkPerShot'
            'ownPaintRecoveryMultiplier'
            'IsReceivingOwnPaintRecovery'
            'TryGetTeamAtWorldPosition'
          )

          for pattern in "${required_weapon_patterns[@]}"; do
            grep -q "$pattern" 'Splat Fighters/Assets/Scripts/Weapons/InkWeapon.cs' || {
              echo "Missing ink resource weapon code pattern: $pattern"
              exit 1
            }
          done

          grep -q 'ResetMotionState' 'Splat Fighters/Assets/Scripts/Player/PlayerController.cs' || {
            echo "Expected PlayerController reset support."
            exit 1
          }

          required_swim_patterns=(
            'SwimHeld'
            'IsSwimming'
            'IsOnEnemyPaint'
            'GetGroundTeamUnderPlayer'
            'enemyPaintMoveSpeedMultiplier'
            'SetExternalRecoveryMultiplier'
            'SetExternalFireBlocked'
            'FindDefaultHumanoidRenderers'
          )

          for pattern in "${required_swim_patterns[@]}"; do
            grep -q "$pattern" 'Splat Fighters/Assets/Scripts/Player/PlayerController.cs' || {
              echo "Missing swim form PlayerController code pattern: $pattern"
              exit 1
            }
          done

          grep -q 'swimKey' 'Splat Fighters/Assets/Scripts/Player/PlayerInputHandler.cs' || {
            echo "Expected PlayerInputHandler swim input support."
            exit 1
          }

          grep -q 'externalFireBlocked' 'Splat Fighters/Assets/Scripts/Weapons/InkWeapon.cs' || {
            echo "Expected InkWeapon external fire block support for swim form."
            exit 1
          }

          grep -q 'ResetBotState' 'Splat Fighters/Assets/Scripts/AI/BotController.cs' || {
            echo "Expected BotController reset support."
            exit 1
          }

          required_bot_patterns=(
            'useTerritoryAwareAim'
            'priorityPaintTargetTeam'
            'lowInkRetreatPercent'
            'resumeInkPercent'
            'retreatWhenPressured'
            'ResolveRetreatTarget'
            'IsStandingOnPaintOwnedBy'
            'SetExternalFireBlocked'
          )

          for pattern in "${required_bot_patterns[@]}"; do
            grep -q "$pattern" 'Splat Fighters/Assets/Scripts/AI/BotController.cs' || {
              echo "Missing territory-aware bot code pattern: $pattern"
              exit 1
            }
          done

          grep -q 'TryFindNearestCellOwnedBy' 'Splat Fighters/Assets/Scripts/Painting/PaintManager.cs' || {
            echo "Expected PaintManager territory query support."
            exit 1
          }

          grep -q 'TryFindNearestCellOwnedBy' 'Splat Fighters/Assets/Scripts/Painting/PaintableArea.cs' || {
            echo "Expected PaintableArea nearest-cell query support."
            exit 1
          }

          required_health_patterns=(
            'public class CharacterHealth'
            'Eliminated'
            'enemyPaintDamagePerSecond'
            'TryGetEnemyPaintTeam'
            'ReviveFull'
            'ApplyDamage'
          )

          for pattern in "${required_health_patterns[@]}"; do
            grep -q "$pattern" 'Splat Fighters/Assets/Scripts/Combat/CharacterHealth.cs' || {
              echo "Missing CharacterHealth code pattern: $pattern"
              exit 1
            }
          done

          required_respawn_patterns=(
            'RespawnCharacterAfterDelay'
            'HandleCharacterEliminated'
            'StopRespawnRoutines'
            'playerHealth'
            'teamBBotHealth'
          )

          for pattern in "${required_respawn_patterns[@]}"; do
            grep -q "$pattern" 'Splat Fighters/Assets/Scripts/Managers/GameManager.cs' || {
              echo "Missing GameManager respawn code pattern: $pattern"
              exit 1
            }
          done

          paintable_cell_count="$(python3 - <<'PY'
          from pathlib import Path
          import re

          scene = Path("Splat Fighters/Assets/Scenes/MVP_ShootingTest.unity").read_text(encoding="utf-8")
          match = re.search(r"paintableCellCount: (\d+)", scene)

          if match is None:
              raise SystemExit("Missing paintableCellCount serialization.")

          print(match.group(1))
          PY
          )"

          if [ "$paintable_cell_count" -le 0 ] || [ "$paintable_cell_count" -gt 3600 ]; then
            echo "Expected serialized paintable cell count to be between 1 and 3600, found $paintable_cell_count."
            exit 1
          fi

          patrol_count="$(grep -c 'm_Name: TeamBBotPatrol_' "$scene")"
          if [ "$patrol_count" -lt 4 ]; then
            echo "Expected at least 4 TeamB bot patrol points, found $patrol_count."
            exit 1
          fi

          paint_target_count="$(grep -c 'm_Name: TeamBBotPaintTarget_' "$scene")"
          if [ "$paint_target_count" -lt 4 ]; then
            echo "Expected at least 4 TeamB bot paint targets, found $paint_target_count."
            exit 1
          fi

  documentation:
    name: Documentation package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Word document package
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          from zipfile import ZipFile

          docx_path = Path("Splat Fighters/Docs/Splat_Fighters_Project_Technical_Documentation.docx")

          with ZipFile(docx_path) as docx:
              bad_file = docx.testzip()
              if bad_file is not None:
                  raise SystemExit(f"Corrupt file inside docx package: {bad_file}")

              required_entries = {
                  "[Content_Types].xml",
                  "word/document.xml",
              }

              names = set(docx.namelist())
              missing = required_entries - names
              if missing:
                  raise SystemExit(f"Missing docx entries: {sorted(missing)}")

          print("Word document package is valid.")
          PY
